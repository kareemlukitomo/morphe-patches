[tools]
java = "17.0.2"
node = "lts"
python = "3.14.3"
sops = "3.12.1"

[tasks.sign-release]
description = "Sign the latest or specified GitHub release .mpp asset"
run = '''
set -euo pipefail
if [ -f secrets/sign-release.env.sops.yaml ]; then
  sops exec-env secrets/sign-release.env.sops.yaml "python3 scripts/sign-latest-release.py $*"
else
  python3 scripts/sign-latest-release.py "$@"
fi
'''
